name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Run shellcheck on check scripts
        run: |
          find checks.d -name '*.sh' -print0 | xargs -0 shellcheck -s bash -S warning -e SC1091,SC2034

      - name: Check for direct exit calls in check scripts
        run: |
          fail=0
          while IFS= read -r -d '' file; do
            # awk: skip heredoc blocks, then flag any 'exit' call
            matches=$(awk '
              /<<[A-Za-z_]+/ {
                marker = $NF
                gsub(/[^A-Za-z_]/, "", marker)
                in_heredoc = 1
                next
              }
              in_heredoc && $0 ~ "^" marker "$" { in_heredoc = 0; next }
              in_heredoc { next }
              /\<exit[[:space:]]+[0-9]/ { print NR ": " $0 }
            ' "$file")
            if [ -n "$matches" ]; then
              echo "ERROR: Direct exit in $file (use fail_with/skip_with instead):"
              echo "$matches"
              fail=1
            fi
          done < <(find checks.d -name '*.sh' -print0)
          if [ "$fail" -eq 1 ]; then
            echo ""
            echo "Check scripts must not call exit directly."
            echo "Use: fail_with (failure), skip_with (skip), or fall through (pass)."
            exit 1
          fi

      - name: Check for unhandled oc/virtctl commands in check scripts
        run: |
          fail=0
          while IFS= read -r -d '' file; do
            # awk: skip heredoc blocks and cleanup traps, then flag oc/virtctl
            # commands that could fail without a fail_with/skip_with message
            matches=$(awk '
              /<<[A-Za-z_]+/ {
                marker = $NF
                gsub(/[^A-Za-z_]/, "", marker)
                in_heredoc = 1
                next
              }
              in_heredoc && $0 ~ "^" marker "$" { in_heredoc = 0; next }
              in_heredoc { next }
              /^\s*#/ { next }
              /cleanup\(\)/ { in_cleanup = 1 }
              in_cleanup && /^\}/ { in_cleanup = 0; next }
              in_cleanup { next }
              /\$\(/ { next }
              /(oc (create|apply|delete|wait|patch)|virtctl (create|stop|start))/ {
                if (/\|\|/ || /&&/ || /\\$/) next
                if (/--ignore-not-found/) next
                if (/\| tee/) next
                print NR ": " $0
              }
            ' "$file")
            if [ -n "$matches" ]; then
              echo "ERROR: Unhandled command in $file (add || fail_with):"
              echo "$matches"
              fail=1
            fi
          done < <(find checks.d -name '*.sh' -print0)
          if [ "$fail" -eq 1 ]; then
            echo ""
            echo "oc/virtctl commands must have error handling (|| fail_with/skip_with)."
            echo "The runner uses bash -xe, so unhandled failures exit silently."
            exit 1
          fi

      - name: Run shellcheck on bin helpers and gather
        run: |
          shellcheck -s bash -S warning -e SC1091 \
            bin/fail_with bin/pass_with bin/skip_with bin/step bin/summarize_results bin/oc_cached \
            bin/entrypoint.sh bin/download-tools.sh \
            collection-scripts/gather

  license-headers:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Check license headers
        run: ./hack/check-license-headers.sh

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check syntax
        run: python3 -m py_compile virt-cluster-validate

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

  container:
    name: Container Build
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Build container image
        run: podman build -t virt-cluster-validate:test .
